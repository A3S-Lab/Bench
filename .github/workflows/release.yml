name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Require tag to match Cargo version
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          test "${GITHUB_REF_NAME}" = "v${version}"
      - run: cargo fmt --all -- --check
      - run: python3 tools/check_builtins.py
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings
      - name: Run Docker-backed integration tests
        run: cargo test --locked -- --ignored --nocapture
      - name: Run local Runtime smoke tests
        run: ./tools/smoke_local.sh
      - name: Run imported Task/Judge smoke test
        run: ./tools/smoke_imported.sh

  package:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and verify component package
        run: python3 tools/package_component.py
      - uses: actions/upload-artifact@v4
        with:
          name: component-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --prerelease
          --generate-notes
